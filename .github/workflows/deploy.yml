name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/fastapi-bff
            git stash
            git pull origin master
            /root/miniconda3/envs/fastbff/bin/uv sync --frozen
            sudo systemctl restart fastapi-bff
            sudo systemctl status fastapi-bff
